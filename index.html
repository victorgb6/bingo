<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pride Bingo</title>
<script type="module" src="/src/main.js"></script>
</head>
<body>

<h1>Pride Bingo</h1>
<div class="pride-bar"></div>

<div class="top-section">
  <div class="current-draw">
    <div class="label">Last drawn</div>
    <div class="current-number" id="currentNumber"><span>--</span></div>
  </div>
  <div class="host-controls" style="display:flex; flex-direction:column; align-items:center; gap:1.2vmin;">
    <div class="mode-toggle">
      <span id="labelRandom" class="active">Random</span>
      <div class="toggle-track" id="modeToggle"></div>
      <span id="labelManual">Manual</span>
    </div>
    <div id="randomControls">
      <button class="draw-btn" id="drawBtn">Draw Number</button>
    </div>
    <div id="manualControls" style="display:none;" class="manual-input">
      <input type="text" id="manualNumber" inputmode="numeric" placeholder="1-90" maxlength="2">
      <button class="draw-btn" id="manualSubmitBtn">Enter</button>
      <button class="undo-btn" id="undoBtn" disabled>Undo</button>
      <div class="error-msg" id="manualError"></div>
    </div>
    <div class="stats">
      Drawn: <span id="drawnCount">0</span> / 90 &nbsp;|&nbsp; Remaining: <span id="remainingCount">90</span>
    </div>
    <button class="reset-btn" id="hostResetBtn">Reset Game</button>
  </div>
</div>

<div class="history" id="history"></div>

<div class="board" id="board"></div>

<button class="settings-btn" id="settingsBtn" title="Settings">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<div class="settings-panel" id="settingsPanel">
  <div class="setting-row">
    <span class="setting-label">Remote control</span>
    <div class="toggle-track" id="remoteToggle"></div>
  </div>
</div>

<button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen">
  <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
  <svg id="fsIconShrink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
    <line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
</button>

<div class="connection-panel" id="connectionPanel" style="display:none;">
  <div class="connection-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Generating...</span>
  </div>
  <div class="qr-container" id="qrCode"></div>
  <div class="room-code" id="roomCodeDisplay"></div>
</div>

<div class="remote-ui" id="remoteUI">
  <h2 class="remote-title">Pride Bingo</h2>
  <div class="pride-bar" style="width:80vw;"></div>
  <div class="connection-status">
    <span class="status-dot" id="remoteStatusDot"></span>
    <span id="remoteStatusText">Connecting...</span>
  </div>
  <div class="remote-info">
    <div class="current-draw">
      <div class="label">Last drawn</div>
      <div class="current-number" id="remoteCurrentNumber"><span>--</span></div>
    </div>
    <div class="stats">
      Drawn: <span id="remoteDrawnCount">0</span> / 90
    </div>
  </div>
  <div class="remote-controls">
    <div id="remoteRandomControls">
      <button class="draw-btn" id="remoteDrawBtn" disabled>Draw Number</button>
    </div>
    <div class="mode-toggle">
      <span id="remoteLabelRandom" class="active">Random</span>
      <div class="toggle-track" id="remoteModeToggle"></div>
      <span id="remoteLabelManual">Manual</span>
    </div>
    <div id="remoteManualControls" style="display:none;" class="manual-input">
      <input type="text" id="remoteManualNumber" inputmode="numeric" placeholder="1-90" maxlength="2">
      <button class="draw-btn" id="remoteManualSubmitBtn">Enter</button>
    </div>
    <button class="undo-btn" id="remoteUndoBtn" disabled>Undo</button>
    <button class="reset-btn" id="remoteResetBtn">Reset Game</button>
  </div>
  <div class="remote-error" id="remoteError"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-ring">
    <div class="overlay-number" id="overlayNumber"></div>
  </div>
</div>

</body>
</html>
