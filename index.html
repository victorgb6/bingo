<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Bingo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes rainbow-shift {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a0a2e;
    color: #f0e6ff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2vmin 2vmin;
    gap: 1vmin;
    user-select: none;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 30%, rgba(228, 3, 3, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 20%, rgba(255, 140, 0, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 77, 255, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(117, 7, 135, 0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  h1 {
    font-size: 5vmin;
    font-weight: 900;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: linear-gradient(
      90deg,
      #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787,
      #FFAFC8, #73D7EE, #613915,
      #E40303
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow-shift 5s linear infinite;
    filter: drop-shadow(0 0 20px rgba(255, 100, 200, 0.4));
    flex-shrink: 0;
  }

  .pride-bar {
    width: 60vw;
    max-width: 800px;
    height: 0.6vmin;
    border-radius: 1vmin;
    background: linear-gradient(90deg,
      #E40303 0%, #E40303 11%,
      #FF8C00 11%, #FF8C00 22%,
      #FFED00 22%, #FFED00 33%,
      #008026 33%, #008026 44%,
      #004DFF 44%, #004DFF 55%,
      #750787 55%, #750787 66%,
      #000000 66%, #000000 72%,
      #613915 72%, #613915 78%,
      #73D7EE 78%, #73D7EE 84%,
      #FFAFC8 84%, #FFAFC8 90%,
      #FFFFFF 90%, #FFFFFF 100%
    );
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(255, 100, 200, 0.3);
  }

  .top-section {
    display: flex;
    align-items: center;
    gap: 3vmin;
    width: 100%;
    justify-content: center;
    flex-shrink: 0;
  }

  .current-draw {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4vmin;
  }

  .current-draw .label {
    font-size: 1.6vmin;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #c4a0ff;
  }

  .current-number {
    width: 12vmin;
    height: 12vmin;
    border-radius: 50%;
    background: conic-gradient(#E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787, #E40303);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6vmin;
    font-weight: 900;
    color: #fff;
    box-shadow: 0 0 25px rgba(255, 0, 110, 0.4);
    transition: transform 0.3s ease;
    position: relative;
  }

  .current-number::before {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: #1a0a2e;
  }

  .current-number span {
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .current-number.pop {
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0.5; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .draw-btn {
    font-size: 2.5vmin;
    font-weight: 800;
    padding: 1.5vmin 4vmin;
    border: none;
    border-radius: 1vmin;
    background: linear-gradient(135deg, #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787);
    background-size: 300% 100%;
    animation: rainbow-shift 3s linear infinite;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 25px rgba(255, 0, 110, 0.3);
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .draw-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 35px rgba(255, 0, 110, 0.5);
  }

  .draw-btn:active {
    transform: translateY(0) scale(0.98);
  }

  .draw-btn:disabled {
    background: #2d1b4e;
    color: #6b5b8a;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
    animation: none;
  }

  .stats {
    font-size: 1.8vmin;
    color: #b088e0;
    display: flex;
    gap: 3vmin;
  }

  .stats span {
    color: #e0c0ff;
    font-weight: 700;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(9, 1fr);
    gap: 0.5vmin;
    width: 92vw;
    max-width: 1400px;
    flex: 1;
    min-height: 0;
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8vmin;
    font-weight: 700;
    border-radius: 0.6vmin;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.07);
    min-height: 0;
    position: relative;
    overflow: visible;
  }

  .cell.drawn {
    color: #fff;
    font-weight: 800;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    border-color: rgba(255, 255, 255, 0.25);
  }

  .cell.just-drawn {
    animation: highlight 0.6s ease;
  }

  @keyframes highlight {
    0% { transform: scale(0.7); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .history {
    display: flex;
    gap: 0.5vmin;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 92vw;
    min-height: 2.5vmin;
    flex-shrink: 0;
  }

  .history-item {
    font-size: 1.5vmin;
    background: rgba(255, 255, 255, 0.06);
    padding: 0.2vmin 0.7vmin;
    border-radius: 0.3vmin;
    color: #a080c0;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .history-item:last-child {
    background: linear-gradient(135deg, #ff006e, #8338ec);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    font-weight: 700;
  }

  .reset-btn {
    font-size: 1.5vmin;
    padding: 0.5vmin 1.8vmin;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.5vmin;
    background: transparent;
    color: #a080c0;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reset-btn:hover {
    border-color: #E40303;
    color: #E40303;
  }

  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 1vmin;
    font-size: 1.6vmin;
    color: #a080c0;
  }

  .mode-toggle span {
    transition: color 0.2s;
  }

  .mode-toggle span.active {
    color: #e0c0ff;
    font-weight: 700;
  }

  .toggle-track {
    width: 5vmin;
    height: 2.4vmin;
    border-radius: 1.2vmin;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .toggle-track.on {
    background: rgba(255,175,200,0.3);
    border-color: #FFAFC8;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    width: 1.8vmin;
    height: 1.8vmin;
    border-radius: 50%;
    background: #e0c0ff;
    top: 50%;
    left: 0.3vmin;
    transform: translateY(-50%);
    transition: left 0.2s;
  }

  .toggle-track.on::after {
    left: calc(100% - 2.1vmin);
    background: #FFAFC8;
  }

  .manual-input {
    display: flex;
    align-items: center;
    gap: 0.8vmin;
  }

  .manual-input input {
    width: 7vmin;
    height: 3.5vmin;
    border-radius: 0.6vmin;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 2.2vmin;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .manual-input input:focus {
    border-color: #FFAFC8;
  }

  .manual-input input::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .manual-input .error-msg {
    font-size: 1.4vmin;
    color: #E40303;
    min-width: 12vmin;
  }

  .undo-btn {
    font-size: 1.8vmin;
    font-weight: 700;
    padding: 0.8vmin 2vmin;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.6vmin;
    background: rgba(255,255,255,0.06);
    color: #a080c0;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .undo-btn:hover {
    border-color: #FF8C00;
    color: #FF8C00;
  }

  .undo-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    border-color: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.2);
  }

  .cell-x {
    display: none;
    position: absolute;
    top: -0.4vmin;
    right: -0.4vmin;
    width: 2.2vmin;
    height: 2.2vmin;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.4);
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.2vmin;
    font-weight: 900;
    line-height: 2.2vmin;
    text-align: center;
    cursor: pointer;
    z-index: 2;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 0;
    font-family: inherit;
    backdrop-filter: blur(4px);
  }

  body.manual-active .cell.drawn:hover .cell-x {
    display: block;
  }

  .cell-x:hover {
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    transform: scale(1.2);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 5, 30, 0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-ring {
    width: 48vmin;
    height: 48vmin;
    border-radius: 50%;
    background: conic-gradient(
      #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787,
      #613915, #73D7EE, #FFAFC8, #FFFFFF,
      #E40303
    );
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 60px rgba(228, 3, 3, 0.3),
      0 0 120px rgba(117, 7, 135, 0.2);
    transform: scale(0);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  .overlay.visible .overlay-ring {
    transform: scale(1);
    animation: spin 3s linear infinite;
  }

  .overlay-number {
    width: 41vmin;
    height: 41vmin;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #2d1060, #1a0a2e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20vmin;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px rgba(255, 0, 110, 0.5), 0 0 80px rgba(131, 56, 236, 0.3);
  }

  .fullscreen-btn {
    position: fixed;
    bottom: 1.5vmin;
    right: 1.5vmin;
    z-index: 50;
    width: 4vmin;
    height: 4vmin;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.5vmin;
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    backdrop-filter: blur(4px);
  }

  .fullscreen-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }

  .fullscreen-btn svg {
    width: 2.2vmin;
    height: 2.2vmin;
  }
</style>
</head>
<body>

<h1>Drag Bingo</h1>
<div class="pride-bar"></div>

<div class="top-section">
  <div class="current-draw">
    <div class="label">Last drawn</div>
    <div class="current-number" id="currentNumber"><span>--</span></div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:1.2vmin;">
    <div class="mode-toggle">
      <span id="labelRandom" class="active">Random</span>
      <div class="toggle-track" id="modeToggle" onclick="toggleMode()"></div>
      <span id="labelManual">Manual</span>
    </div>
    <div id="randomControls">
      <button class="draw-btn" id="drawBtn" onclick="drawNumber()">Draw Number</button>
    </div>
    <div id="manualControls" style="display:none;" class="manual-input">
      <input type="text" id="manualNumber" inputmode="numeric" placeholder="1-90" maxlength="2" onkeydown="if(event.key==='Enter')submitManual()">
      <button class="draw-btn" onclick="submitManual()">Enter</button>
      <button class="undo-btn" id="undoBtn" onclick="undoLast()" disabled>Undo</button>
      <div class="error-msg" id="manualError"></div>
    </div>
    <div class="stats">
      Drawn: <span id="drawnCount">0</span> / 90 &nbsp;|&nbsp; Remaining: <span id="remainingCount">90</span>
    </div>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>
  </div>
</div>

<div class="history" id="history"></div>

<div class="board" id="board"></div>

<button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Toggle fullscreen">
  <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
  <svg id="fsIconShrink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
    <line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
</button>

<div class="overlay" id="overlay">
  <div class="overlay-ring">
    <div class="overlay-number" id="overlayNumber"></div>
  </div>
</div>

<script>
  const FLAG_COLORS = [
    { bg: '#E40303', glow: 'rgba(228,3,3,0.45)' },
    { bg: '#FF8C00', glow: 'rgba(255,140,0,0.45)' },
    { bg: '#FFED00', glow: 'rgba(255,237,0,0.45)', dark: true },
    { bg: '#008026', glow: 'rgba(0,128,38,0.45)' },
    { bg: '#004DFF', glow: 'rgba(0,77,255,0.45)' },
    { bg: '#750787', glow: 'rgba(117,7,135,0.45)' },
    { bg: '#73D7EE', glow: 'rgba(115,215,238,0.45)', dark: true },
    { bg: '#FFAFC8', glow: 'rgba(255,175,200,0.45)', dark: true },
    { bg: '#613915', glow: 'rgba(97,57,21,0.45)' },
  ];

  const drawn = new Set();
  const order = [];
  let manualMode = false;

  function toggleMode() {
    manualMode = !manualMode;
    document.getElementById('modeToggle').classList.toggle('on', manualMode);
    document.getElementById('labelRandom').classList.toggle('active', !manualMode);
    document.getElementById('labelManual').classList.toggle('active', manualMode);
    document.getElementById('randomControls').style.display = manualMode ? 'none' : '';
    document.getElementById('manualControls').style.display = manualMode ? 'flex' : 'none';
    document.getElementById('manualError').textContent = '';
    document.body.classList.toggle('manual-active', manualMode);
    if (manualMode) document.getElementById('manualNumber').focus();
  }

  function submitManual() {
    if (drawing) return;
    const input = document.getElementById('manualNumber');
    const errorEl = document.getElementById('manualError');
    const num = parseInt(input.value, 10);

    if (isNaN(num) || num < 1 || num > 90) {
      errorEl.textContent = 'Enter 1-90';
      return;
    }
    if (drawn.has(num)) {
      errorEl.textContent = 'Already drawn';
      return;
    }

    errorEl.textContent = '';
    input.value = '';
    revealNumber(num);
  }

  function undoLast() {
    if (drawing || order.length === 0) return;

    const num = order.pop();
    drawn.delete(num);

    const cell = document.getElementById('cell-' + num);
    cell.classList.remove('drawn');
    cell.style.background = '';
    cell.style.boxShadow = '';
    cell.style.color = '';

    const lastNum = order.length > 0 ? order[order.length - 1] : '--';
    document.getElementById('currentNumber').querySelector('span').textContent = lastNum;

    document.getElementById('drawnCount').textContent = drawn.size;
    document.getElementById('remainingCount').textContent = 90 - drawn.size;

    document.querySelectorAll('.draw-btn').forEach(b => b.disabled = false);

    renderHistory();
    updateUndoBtn();
    document.getElementById('manualError').textContent = '';
  }

  function removeNumber(num) {
    drawn.delete(num);
    order.splice(order.indexOf(num), 1);

    const cell = document.getElementById('cell-' + num);
    cell.classList.remove('drawn');
    cell.style.background = '';
    cell.style.boxShadow = '';
    cell.style.color = '';

    const lastNum = order.length > 0 ? order[order.length - 1] : '--';
    document.getElementById('currentNumber').querySelector('span').textContent = lastNum;

    document.getElementById('drawnCount').textContent = drawn.size;
    document.getElementById('remainingCount').textContent = 90 - drawn.size;

    document.querySelectorAll('.draw-btn').forEach(b => b.disabled = false);

    renderHistory();
    updateUndoBtn();
  }

  function updateUndoBtn() {
    document.getElementById('undoBtn').disabled = order.length === 0;
  }

  function initBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (let i = 1; i <= 90; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell-' + i;
      cell.textContent = i;
      const xBtn = document.createElement('button');
      xBtn.className = 'cell-x';
      xBtn.textContent = '✕';
      xBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (manualMode && !drawing && drawn.has(i)) removeNumber(i);
      });
      cell.appendChild(xBtn);
      board.appendChild(cell);
    }
  }

  function getColor(num) {
    return FLAG_COLORS[Math.floor((num - 1) / 10)];
  }

  let drawing = false;

  function drawNumber() {
    if (drawing) return;

    const remaining = [];
    for (let i = 1; i <= 90; i++) {
      if (!drawn.has(i)) remaining.push(i);
    }
    if (remaining.length === 0) return;

    const num = remaining[Math.floor(Math.random() * remaining.length)];
    revealNumber(num);
  }

  function revealNumber(num) {
    drawing = true;
    document.querySelectorAll('.draw-btn').forEach(b => b.disabled = true);

    drawn.add(num);
    order.push(num);

    const overlay = document.getElementById('overlay');
    const overlayNum = document.getElementById('overlayNumber');
    overlayNum.textContent = num;
    overlay.classList.add('visible');

    setTimeout(() => {
      overlay.classList.remove('visible');

      const c = getColor(num);
      const cell = document.getElementById('cell-' + num);
      cell.classList.add('drawn', 'just-drawn');
      cell.style.background = c.bg;
      cell.style.boxShadow = '0 0 10px ' + c.glow;
      if (c.dark) cell.style.color = '#1a0a2e';
      setTimeout(() => cell.classList.remove('just-drawn'), 600);

      const display = document.getElementById('currentNumber');
      display.querySelector('span').textContent = num;
      display.classList.remove('pop');
      void display.offsetWidth;
      display.classList.add('pop');

      document.getElementById('drawnCount').textContent = drawn.size;
      document.getElementById('remainingCount').textContent = 90 - drawn.size;

      renderHistory();
      updateUndoBtn();

      drawing = false;
      if (drawn.size < 90) {
        document.querySelectorAll('.draw-btn').forEach(b => b.disabled = false);
      }
      if (manualMode) document.getElementById('manualNumber').focus();
    }, 3000);
  }

  function renderHistory() {
    const el = document.getElementById('history');
    el.innerHTML = order.map(n =>
      '<div class="history-item">' + n + '</div>'
    ).join('');
    el.scrollLeft = el.scrollWidth;
  }

  function resetGame() {
    drawn.clear();
    order.length = 0;
    document.getElementById('currentNumber').querySelector('span').textContent = '--';
    document.getElementById('drawnCount').textContent = '0';
    document.getElementById('remainingCount').textContent = '90';
    document.getElementById('drawBtn').disabled = false;
    document.getElementById('history').innerHTML = '';
    document.querySelectorAll('.cell').forEach(c => {
      c.classList.remove('drawn', 'just-drawn');
      c.style.background = '';
      c.style.boxShadow = '';
      c.style.color = '';
    });
    updateUndoBtn();
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  let wakeLock = null;

  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
  }

  async function releaseWakeLock() {
    if (wakeLock) {
      await wakeLock.release();
      wakeLock = null;
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    document.getElementById('fsIconExpand').style.display = isFs ? 'none' : '';
    document.getElementById('fsIconShrink').style.display = isFs ? '' : 'none';
    if (isFs) requestWakeLock(); else releaseWakeLock();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && document.fullscreenElement) requestWakeLock();
  });

  initBoard();
</script>

</body>
</html>
